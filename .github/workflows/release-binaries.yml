      - name: Install dependencies
        run: bun install

      - name: Build with Bun config
        run: bun run build:bun

      - name: Build binary
        run: bun build --compile --target=bun-linux-arm64 ./bin/cli.js --outfile curator-linux-arm64

      - name: Create archive
        run: |
          VER="${{ steps.get_version.outputs.VERSION }}"
          DIR="ai-curator-${VER}-linux-arm64"
          mkdir -p "$DIR"
          cp curator-linux-arm64 "$DIR/curator"
          cp LICENSE "$DIR/" 2>/dev/null || true
          cp README.md "$DIR/" 2>/dev/null || true
          echo "# AI Curator - Quick Start" > "$DIR/QUICKSTART.md"
          echo "" >> "$DIR/QUICKSTART.md"
          echo "## Installation" >> "$DIR/QUICKSTART.md"
          echo "" >> "$DIR/QUICKSTART.md"
          echo "1. Extract this archive" >> "$DIR/QUICKSTART.md"
          echo "2. Move curator to your PATH" >> "$DIR/QUICKSTART.md"
          echo "3. Run: curator" >> "$DIR/QUICKSTART.md"
          tar -czf "${DIR}.tar.gz" "$DIR"
          sha256sum "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: ai-curator-*.tar.gz*

  release:
    name: Create Release
    needs: [build-macos-arm64, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create SHASUMS256.txt
        run: |
          cd ./artifacts
          cat *.sha256 > SHASUMS256.txt
          cd ..

      - name: Display files
        run: ls -la ./artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || github.event.inputs.version != '' && (contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'alpha')) }}
          files: |
            ./artifacts/ai-curator-*.tar.gz
            ./artifacts/SHASUMS256.txt
          body: |
            ## AI Curator ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

            **Built with bun:sqlite for native performance across all platforms.**

            ### What's New
            - Migrated from better-sqlite3 to bun:sqlite
            - Fixed macOS ARM64 compatibility
            - Single binary distribution (no external dependencies)
            - Built with Bun's compile feature

            ### Installation

            #### macOS (Homebrew - Recommended)
            ```bash
            brew tap elgap/tap
            brew install ai-curator
            ```

            #### macOS/Linux (curl)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/elgap/ai-curator/main/install.sh | bash
            ```

            #### npm
            ```bash
            npm install -g @elgap/ai-curator
            ```

            ### Quick Start

            ```bash
            curator --version
            curator                    # Start web UI
            curator import data.jsonl --dataset 1
            curator export --dataset 1 --format mlx --output train.jsonl
            ```

            ### Platform Support

            | Platform | Architecture | Package |
            |----------|--------------|---------|
            | macOS | ARM64 (Apple Silicon) | ai-curator-*-darwin-arm64.tar.gz |
            | Linux | x64 | ai-curator-*-linux-x64.tar.gz |
            | Linux | ARM64 | ai-curator-*-linux-arm64.tar.gz |

            ### Verification

            Verify checksums:
            ```bash
            shasum -a 256 -c SHASUMS256.txt
            ```

            ### Links

            - [Documentation](https://github.com/elgap/ai-curator#readme)
            - [Issues](https://github.com/elgap/ai-curator/issues)
            - [Homebrew Tap](https://github.com/elgap/homebrew-tap)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
