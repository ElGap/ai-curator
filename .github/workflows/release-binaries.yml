name: Build and Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 0.4.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        run: |
          bun build --compile --target=bun-darwin-arm64 \
            ./bin/cli.js \
            --outfile "curator-darwin-arm64"

      - name: Calculate SHA256
        run: shasum -a 256 curator-darwin-arm64 > curator-darwin-arm64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curator-darwin-arm64
          path: curator-darwin-arm64*

  build-macos-x64:
    name: Build macOS x64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        run: |
          bun build --compile --target=bun-darwin-x64 \
            ./bin/cli.js \
            --outfile "curator-darwin-x64"

      - name: Calculate SHA256
        run: shasum -a 256 curator-darwin-x64 > curator-darwin-x64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curator-darwin-x64
          path: curator-darwin-x64*

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        run: |
          bun build --compile --target=bun-linux-x64 \
            ./bin/cli.js \
            --outfile "curator-linux-x64"

      - name: Calculate SHA256
        run: sha256sum curator-linux-x64 > curator-linux-x64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curator-linux-x64
          path: curator-linux-x64*

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        run: |
          bun build --compile --target=bun-linux-arm64 \
            ./bin/cli.js \
            --outfile "curator-linux-arm64"

      - name: Calculate SHA256
        run: sha256sum curator-linux-arm64 > curator-linux-arm64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curator-linux-arm64
          path: curator-linux-arm64*

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        run: |
          bun build --compile --target=bun-windows-x64 `
            .\bin\cli.js `
            --outfile "curator-windows-x64.exe"

      - name: Calculate SHA256
        shell: pwsh
        run: |
          $hash = Get-FileHash curator-windows-x64.exe -Algorithm SHA256
          $hash.Hash | Out-File "curator-windows-x64.exe.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curator-windows-x64
          path: curator-windows-x64*

  release:
    name: Create Release
    needs:
      [build-macos-arm64, build-macos-x64, build-linux-x64, build-linux-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
          pattern: curator-*
          merge-multiple: true

      - name: Display structure
        run: |
          echo "=== Directory structure ==="
          ls -laR ./binaries/
          echo "=== Flatten if needed ==="
          find ./binaries -type f -name "curator-*" | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || github.event.inputs.version != '' && (contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'alpha')) }}
          files: ./binaries/curator-*
          body: |
            ## AI Curator ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

            **Universal binary distribution for npm, Homebrew, and direct download.**

            ### Installation

            #### npm (Recommended for Node.js users)
            ```bash
            npm install -g @elgap/ai-curator
            ```

            #### Homebrew (macOS/Linux)
            ```bash
            brew tap elgap/tap
            brew install ai-curator
            ```

            #### Try without installing
            ```bash
            npx @elgap/ai-curator --version
            ```

            #### Direct Download
            Download the appropriate binary for your platform and add to your PATH.

            ### Binaries

            | Platform | Binary | SHA256 |
            |----------|--------|--------|
            | macOS ARM64 | curator-darwin-arm64 | Check .sha256 file |
            | macOS x64 | curator-darwin-x64 | Check .sha256 file |
            | Linux x64 | curator-linux-x64 | Check .sha256 file |
            | Linux ARM64 | curator-linux-arm64 | Check .sha256 file |

            ### Quick Start

            ```bash
            curator --version
            curator import data.jsonl --dataset 1
            curator export --dataset 1 --format mlx --output train.jsonl
            ```

            ### Links

            - [Documentation](https://github.com/elgap/ai-curator#readme)
            - [Issues](https://github.com/elgap/ai-curator/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
