name: Build and Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 0.4.6-beta)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: bun install

      - name: Build with Bun config
        run: bun run build:bun

      - name: Build binary
        run: bun build --compile --target=bun-darwin-arm64 ./bin/cli.js --outfile curator-darwin-arm64

      - name: Create archive
        run: |
          VER="${{ steps.get_version.outputs.VERSION }}"
          DIR="ai-curator-${VER}-darwin-arm64"
          mkdir -p "$DIR"
          cp curator-darwin-arm64 "$DIR/curator"
          cp LICENSE "$DIR/" 2>/dev/null || true
          cp README.md "$DIR/" 2>/dev/null || true
          echo "# AI Curator - Quick Start" > "$DIR/QUICKSTART.md"
          echo "" >> "$DIR/QUICKSTART.md"
          echo "## Installation" >> "$DIR/QUICKSTART.md"
          echo "" >> "$DIR/QUICKSTART.md"
          echo "1. Extract this archive" >> "$DIR/QUICKSTART.md"
          echo "2. Move curator to your PATH" >> "$DIR/QUICKSTART.md"
          echo "3. Run: curator" >> "$DIR/QUICKSTART.md"
          tar -czf "${DIR}.tar.gz" "$DIR"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: ai-curator-*.tar.gz*

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
