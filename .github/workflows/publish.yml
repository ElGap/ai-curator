name: Publish to NPM

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Nuxt types
        run: npx nuxt prepare

      - name: Run linter
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      # Note: Native dependencies are now externalized in nuxt.config.ts
      # better-sqlite3 will be installed by npm on user's machine with correct platform binary

      - name: Verify build output
        run: |
          if [ ! -d ".output" ]; then
            echo "❌ Build failed: .output directory not found"
            exit 1
          fi
          if [ ! -f ".output/server/index.mjs" ]; then
            echo "❌ Build failed: server entry point not found"
            exit 1
          fi
          echo "✅ Build verified"

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          body: |
            ## AI Curator ${{ github.ref_name }}

            **Local-first dataset curation for LLM fine-tuning**

            ### Installation

            ```bash
            npm install -g @elgap/ai-curator@${{ github.ref_name }}
            ```

            Or use npx (no install):

            ```bash
            npx @elgap/ai-curator@${{ github.ref_name }}
            ```

            ### Quick Start

            ```bash
            curator
            # Open http://localhost:3333
            ```

            ### Links
            - [npm Package](https://www.npmjs.com/package/@elgap/ai-curator)
            - [GitHub Repository](https://github.com/elgap/ai-curator)

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
